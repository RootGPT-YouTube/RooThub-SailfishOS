Name: harbour-roothub
Summary: RooThub is a native GitHub client for Sailfish OS
Version: 0.4.0
Release: 1
Group: Qt/Qt
URL: https://github.com/RootGPT-YouTube/RooThub-SailfishOS
License: GPL-3.0
Sources:
- '%{name}-%{version}.tar.bz2'
Description: |
  RooThub is a native GitHub client for Sailfish OS. Browse repositories,
  read and manage issues and pull requests, follow notifications, search
  GitHub and view profiles. Sign in with the GitHub Device Flow or a
  Personal Access Token.
Configure: none
Builder: qmake5

PkgConfigBR:
  - sailfishapp >= 1.0.2
  - Qt5Core
  - Qt5Qml
  - Qt5Quick

Requires:
  - sailfishsilica-qt5 >= 0.10.9
  - nemo-qml-plugin-configuration-qt5

Files:
  - '%{_bindir}/%{name}'
  - '%{_datadir}/%{name}'
  - '%{_datadir}/applications/%{name}.desktop'
  - '%{_datadir}/icons/hicolor/*/apps/%{name}.png'
